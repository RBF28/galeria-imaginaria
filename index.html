<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Imaginária v5.0</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
</head>
<body id="corpoSite">

<h1 class="titulo">Galeria Imaginária</h1>

<div style="text-align: center;">
    <img src="https://files.catbox.moe/cw56us.png" class="banner" id="bannerPrincipal" alt="Banner Principal">
</div>

<!-- Menu Principal -->
<div class="menuPrincipal">
    <button class="btn btn-menu" onclick="renderizarCatalogo('serie')">Séries</button>
    <button class="btn btn-menu" onclick="renderizarCatalogo('filme')">Filmes</button>
    <button class="btn btn-menu" onclick="renderizarCatalogo('hq')">HQs</button>
    <button class="btn btn-menu" onclick="renderizarCatalogo('favoritos')">❤️ Favoritos</button>
    <button class="btn btn-menu" onclick="renderizarCatalogo('em_alta')">🔥 Em Alta</button>
    <button class="btn btn-menu" onclick="renderizarCatalogo('melhores')">🌟 Melhores</button>
    <button class="btn btn-menu" onclick="abrirExtras()">Extras</button>
</div>

<h2 class="secaoTitulo" id="txtSecao">Séries</h2>

<div id="containerPrincipal">

    <!-- Seção: Continuar Assistindo -->
    <div id="secaoContinuar" style="display:none; padding: 0 15px 10px 15px;">
        <h3 class="subtitulo">▶ Continuar assistindo...</h3>
        <div id="gridContinuar" class="scroll-horizontal"></div>
        <hr class="divisor">
    </div>

    <!-- Grid principal de cards -->
    <div class="grid" id="gridPrincipal"></div>

    <!-- Tela de Detalhes / Player -->
    <div id="telaEpisodios" style="display:none;">
        <div class="barra-topo">
            <button class="btn" onclick="voltar()">⬅ Voltar</button>
            <button id="btnFavDestaque" class="btn">🤍 Favoritar</button>
        </div>

        <img id="capaGrande" class="capaGrande" src="" alt="Capa">

        <!-- Área HQ -->
        <div id="areaHQ" style="display:none; text-align:center; padding:20px;">
            <p id="sinopseHQ" style="line-height:1.6; max-width:600px; margin:0 auto 20px auto; color:#ccc;"></p>
            <a id="linkHQ" href="#" target="_blank" class="btn" style="text-decoration:none; background:#7f00ff;">Ler no Fliptru ↗</a>
        </div>

        <div id="avisoEtario" style="color: #ff4444; font-weight: bold; text-align: center; margin: 10px 0;"></div>
        <p id="epAtual" style="text-align: center; color: #888;"></p>

        <!-- Player de Vídeo -->
        <div class="player" id="playerArea" style="display:none;">
            <video id="player" controls controlsList="nodownload" oncontextmenu="return false;">
                <source id="videoSource" src="" type="video/mp4">
            </video>
            <div class="player-botoes">
                <button class="btn" onclick="document.getElementById('player').requestFullscreen()">⛶ Tela cheia</button>
                <button class="btn" onclick="document.getElementById('player').currentTime += 85">⏭ Pular abertura</button>
            </div>
        </div>

        <!-- Avaliação com estrelas (visível para TODOS os tipos de conteúdo) -->
        <div class="reacoes" id="areaReacoes" style="display:none;">
            <p style="color:#888; font-size:13px; margin-bottom:8px;">Avalie este conteúdo:</p>
            <div id="estrelasContainer">
                <button onclick="avaliar(1)">⭐</button>
                <button onclick="avaliar(2)">⭐</button>
                <button onclick="avaliar(3)">⭐</button>
                <button onclick="avaliar(4)">🌟</button>
                <button onclick="avaliar(5)">🌟</button>
            </div>
            <p id="notaAtual" style="color:#aaa; margin-top:8px; font-size:13px;">Carregando nota...</p>
        </div>

        <div class="episodios" id="listaEps"></div>
    </div>
</div>

<div id="aviso" style="font-size:11px; color:#444; text-align:center; padding:40px;">
    <p>Este site foi feito por Renato Santos. Todas as animações e HQs aqui são de propriedade do autor.</p>
</div>

<audio id="audioEasterEgg" src="musica.mp3"></audio>

<script>
    var series  = [];
    var filmes  = [];
    var hqs     = [];
    var extras  = [];
    var jaReagiu = {};
    var linkAtual = ''; // guarda o link do conteúdo atualmente aberto
</script>

<!-- 2. DADOS EXTERNOS -->
<script src="series/living_in_space.js"></script>
<script src="filmes/filmes.js"></script>
<script src="hqs/hqs.js"></script>
<script src="series/extras.js"></script>

<!-- 3. FIREBASE -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCCtNEEpkWKZD3t2c2sXQ1uXh01AaWWgLI",
        authDomain: "galeria-imaginaria-b1d1c.firebaseapp.com",
        projectId: "galeria-imaginaria-b1d1c",
        storageBucket: "galeria-imaginaria-b1d1c.firebasestorage.app",
        messagingSenderId: "826511324818",
        appId: "1:826511324818:web:0f42e7e59a51120e21984b"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // Gera um ID seguro a partir do link
    function linkParaId(link) {
        return btoa(unescape(encodeURIComponent(link))).replace(/\//g, '_').replace(/=/g, '-');
    }

    // +1 view no Firebase quando um vídeo é aberto
    window.registrarView = async (link) => {
        if (!link) return;
        const ref = doc(db, "estatisticas", linkParaId(link));
        try {
            const snap = await getDoc(ref);
            await setDoc(ref, { views: (snap.exists() ? snap.data().views : 0) + 1 }, { merge: true });
        } catch (e) { console.error("Erro ao registrar view:", e); }
    };

    // Busca rankings de Em Alta ou Melhores Avaliados
    window.getRankings = async (tipo) => {
        const coll = tipo === 'em_alta' ? 'estatisticas' : 'avaliacoes';
        try {
            const snap = await getDocs(collection(db, coll));
            let dados = [];
            snap.forEach(d => {
                try {
                    const link = decodeURIComponent(escape(atob(d.id.replace(/_/g, '/').replace(/-/g, '='))));
                    const val  = tipo === 'em_alta'
                        ? (d.data().views || 0)
                        : (d.data().total || 0) / (d.data().votos || 1);
                    dados.push({ link, val });
                } catch (_) {}
            });
            return dados.sort((a, b) => b.val - a.val);
        } catch (e) {
            console.error("Erro ao buscar rankings:", e);
            return [];
        }
    };

    // Avalia o conteúdo atual com estrelas (1-5)
    // Usa linkAtual em vez de player.src para funcionar em todos os tipos
    window.avaliar = async (estrelas) => {
        const link = window.linkAtual;
        if (!link || jaReagiu[link]) return;
        const ref = doc(db, "avaliacoes", linkParaId(link));
        try {
            const snap = await getDoc(ref);
            if (!snap.exists()) {
                await setDoc(ref, { total: estrelas, votos: 1 });
            } else {
                await setDoc(ref, {
                    total: snap.data().total + estrelas,
                    votos: snap.data().votos + 1
                }, { merge: true });
            }
            jaReagiu[link] = true;
            // Feedback visual: desabilita os botões após avaliar
            document.querySelectorAll('#estrelasContainer button').forEach(b => {
                b.disabled = true;
                b.style.opacity = '0.4';
            });
            window.atualizarNota(link);
        } catch (e) { console.error("Erro ao avaliar:", e); }
    };

    // Atualiza o texto da nota na tela
    window.atualizarNota = async (link) => {
        if (!link) return;
        const label = document.getElementById("notaAtual");
        if (!label) return;
        label.innerText = "Buscando nota...";
        try {
            const snap = await getDoc(doc(db, "avaliacoes", linkParaId(link)));
            if (!snap.exists()) {
                label.innerText = "Sem avaliações ainda. Seja o primeiro!";
            } else {
                const media = (snap.data().total / snap.data().votos).toFixed(1);
                label.innerText = `Nota: ${media}/5 ★ (${snap.data().votos} avaliações)`;
            }
            // Se o usuário já avaliou este conteúdo, desabilita os botões
            if (jaReagiu[link]) {
                document.querySelectorAll('#estrelasContainer button').forEach(b => {
                    b.disabled = true;
                    b.style.opacity = '0.4';
                });
            }
        } catch (e) { console.error("Erro ao buscar nota:", e); }
    };

    console.log("🔥 Firebase 5.0 On!");
</script>

<!-- 4. LÓGICA PRINCIPAL -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const player   = document.getElementById("player");
    const favsKey  = "galeria_favs";
    const vistoKey = "galeria_visto_"; // prefixo para marcar conteúdo assistido

    // Retorna todos os itens de todos os tipos
    function todosItens() {
        return [...series, ...filmes, ...hqs];
    }

    // Verifica se um item tem a badge "NOVO"
    function temNovo(item) {
        if (item.novo === 'RENA') return true;
        if (item.temporadas) {
            return item.temporadas.some(t => t.episodios.some(e => e.novo === 'RENA'));
        }
        return false;
    }

    // Verifica se um episódio/filme foi marcado como visto
    function estaVisto(link) {
        return localStorage.getItem(vistoKey + link) === '1';
    }

    // Marca um conteúdo como visto
    function marcarVisto(link) {
        localStorage.setItem(vistoKey + link, '1');
    }

    // Ativa a área de avaliação para um link
    function ativarReacoes(link) {
        const area = document.getElementById("areaReacoes");
        area.style.display = "block";
        // Reabilita os botões para o novo conteúdo
        document.querySelectorAll('#estrelasContainer button').forEach(b => {
            b.disabled = false;
            b.style.opacity = '1';
        });
        if (window.atualizarNota) window.atualizarNota(link);
    }

    // ─── RENDERIZAR CATÁLOGO ─────────────────────────────────────────────────

    window.renderizarCatalogo = async (filtro) => {
        voltar();
        const grid    = document.getElementById("gridPrincipal");
        const txtSecao = document.getElementById("txtSecao");
        grid.innerHTML = '<p style="color:#555; text-align:center; padding:30px;">Carregando...</p>';

        let listaFinal = [];
        const favs = JSON.parse(localStorage.getItem(favsKey)) || [];

        if (filtro === 'favoritos') {
            txtSecao.innerText = "Meus Favoritos";
            listaFinal = todosItens().filter(i => favs.includes(i.nome));
            if (listaFinal.length === 0) {
                grid.innerHTML = '<p style="color:#555; text-align:center; padding:40px;">Você ainda não tem favoritos. Abra um conteúdo e clique em ❤️ Favoritar!</p>';
                return;
            }

        } else if (filtro === 'em_alta') {
            txtSecao.innerText = "🔥 Em Alta";
            const rankings = await window.getRankings('em_alta');
            rankings.forEach(r => {
                const achado = todosItens().find(i =>
                    i.link === r.link ||
                    (i.temporadas && i.temporadas.some(t => t.episodios.some(e => e.link === r.link)))
                );
                if (achado && !listaFinal.includes(achado)) listaFinal.push(achado);
            });
            if (listaFinal.length === 0) {
                grid.innerHTML = '<p style="color:#555; text-align:center; padding:40px;">Nenhum conteúdo assistido ainda. Começa por aí!</p>';
                return;
            }

        } else if (filtro === 'melhores') {
            txtSecao.innerText = "🌟 Melhores Avaliados";
            const rankings = await window.getRankings('melhores');
            rankings.forEach(r => {
                const achado = todosItens().find(i =>
                    i.link === r.link ||
                    (i.temporadas && i.temporadas.some(t => t.episodios.some(e => e.link === r.link)))
                );
                if (achado && !listaFinal.includes(achado)) listaFinal.push(achado);
            });
            if (listaFinal.length === 0) {
                grid.innerHTML = '<p style="color:#555; text-align:center; padding:40px;">Nenhum conteúdo avaliado ainda. Assista e avalie!</p>';
                return;
            }

        } else {
            const nomes = { hq: "HQs", serie: "Séries", filme: "Filmes" };
            txtSecao.innerText = nomes[filtro] || filtro;
            if (filtro === 'hq')         listaFinal = hqs;
            else if (filtro === 'serie') listaFinal = series;
            else                         listaFinal = filmes;
        }

        grid.innerHTML = "";
        listaFinal.forEach(item => grid.appendChild(criarCard(item)));
        checarProgresso();
    };

    // ─── CRIAR CARD ──────────────────────────────────────────────────────────

    function criarCard(item) {
        const card  = document.createElement("div");
        card.className = "card";

        const favs  = JSON.parse(localStorage.getItem(favsKey)) || [];
        const ehFav = favs.includes(item.nome);
        const novo  = temNovo(item);

        // Badge NOVO (canto superior esquerdo)
        const badgeNovo = novo
            ? `<span class="badge-novo" title="Conteúdo novo!"></span>`
            : '';

        card.innerHTML = `
            <div class="card-img-wrap">
                <img src="${item.capa}" alt="${item.nome}" loading="lazy">
                ${badgeNovo}
                <button class="btn-fav-card ${ehFav ? 'ativo' : ''}" title="Favoritar"
                    onclick="event.stopPropagation(); toggleFavoritoCard(this, '${item.nome.replace(/'/g, "\\'")}')">❤</button>
            </div>
            <p>${item.nome}</p>
        `;

        card.onclick = () => {
            if (item.tipo === 'hq')         abrirHQ(item);
            else if (item.tipo === 'filme') abrirFilme(item);
            else                            abrirSerie(item);
        };

        return card;
    }

    // ─── PLAYER ──────────────────────────────────────────────────────────────

    window.abrirPlayer = (link, nome) => {
        window.linkAtual = link; // <<< define o link atual para as avaliações

        document.getElementById("playerArea").style.display = "block";
        document.getElementById("videoSource").src = link;
        player.load();
        document.getElementById("epAtual").innerText = "▶ Assistindo: " + nome;

        player.onloadedmetadata = () => {
            const tempoSalvo = parseFloat(localStorage.getItem("tempo_" + link)) || 0;
            if (tempoSalvo > 5) player.currentTime = tempoSalvo;
            player.play();
        };

        if (window.registrarView) window.registrarView(link);
        ativarReacoes(link);

        // Atualiza os badges de visto na lista de episódios
        atualizarBadgesVisto();
    };

    // Salva progresso e marca como visto ao atingir 50%
    player.ontimeupdate = () => {
        const link = window.linkAtual;
        if (!link || !player.duration) return;
        localStorage.setItem("tempo_" + link, player.currentTime);
        if ((player.currentTime / player.duration) >= 0.5 && !estaVisto(link)) {
            marcarVisto(link);
            atualizarBadgesVisto();
        }
    };

    // Atualiza os ícones de visto (👁️) nos botões de episódio
    function atualizarBadgesVisto() {
        document.querySelectorAll('[data-link-ep]').forEach(btn => {
            const link = btn.dataset.linkEp;
            const badgeEl = btn.querySelector('.badge-visto');
            if (badgeEl) badgeEl.style.display = estaVisto(link) ? 'inline' : 'none';
        });
    }

    // ─── FAVORITOS ───────────────────────────────────────────────────────────

    window.toggleFavoritoCard = (btn, nome) => {
        let favs = JSON.parse(localStorage.getItem(favsKey)) || [];
        if (favs.includes(nome)) {
            favs = favs.filter(f => f !== nome);
            btn.classList.remove('ativo');
        } else {
            favs.push(nome);
            btn.classList.add('ativo');
        }
        localStorage.setItem(favsKey, JSON.stringify(favs));
        atualizarBotaoFav(nome);
    };

    window.toggleFavorito = (nome) => {
        let favs = JSON.parse(localStorage.getItem(favsKey)) || [];
        favs = favs.includes(nome) ? favs.filter(f => f !== nome) : [...favs, nome];
        localStorage.setItem(favsKey, JSON.stringify(favs));
        atualizarBotaoFav(nome);
    };

    window.atualizarBotaoFav = (nome) => {
        const favs = JSON.parse(localStorage.getItem(favsKey)) || [];
        const btn  = document.getElementById("btnFavDestaque");
        if (!btn) return;
        btn.innerText = favs.includes(nome) ? "❤️ Favoritado" : "🤍 Favoritar";
        btn.onclick   = () => window.toggleFavorito(nome);
    };

    // ─── CONTINUAR ASSISTINDO ────────────────────────────────────────────────

    window.checarProgresso = () => {
        const gridCont = document.getElementById("gridContinuar");
        gridCont.innerHTML = "";
        let encontrou = false;

        todosItens().forEach(item => {
            let temProgresso = false;
            if (item.temporadas) {
                item.temporadas.forEach(t =>
                    t.episodios.forEach(e => {
                        if (parseFloat(localStorage.getItem("tempo_" + e.link)) > 5) temProgresso = true;
                    })
                );
            } else if (item.link && parseFloat(localStorage.getItem("tempo_" + item.link)) > 5) {
                temProgresso = true;
            }

            if (temProgresso) {
                encontrou = true;
                const c = document.createElement("div");
                c.className = "card card-continuar";
                c.innerHTML = `<img src="${item.capa}" alt="${item.nome}"><p>${item.nome}</p>`;
                c.onclick = () => {
                    if (item.tipo === 'hq')         abrirHQ(item);
                    else if (item.tipo === 'filme') abrirFilme(item);
                    else                            abrirSerie(item);
                };
                gridCont.appendChild(c);
            }
        });

        document.getElementById("secaoContinuar").style.display = encontrou ? "block" : "none";
    };

    // ─── ABRIR CONTEÚDO ──────────────────────────────────────────────────────

    window.abrirSerie = (serie) => {
        document.getElementById("gridPrincipal").style.display = "none";
        document.getElementById("telaEpisodios").style.display = "block";
        document.getElementById("capaGrande").src = serie.capa;
        document.getElementById("areaHQ").style.display = "none";
        document.getElementById("playerArea").style.display = "none";
        document.getElementById("areaReacoes").style.display = "none";
        document.getElementById("epAtual").innerText = "";
        document.getElementById("avisoEtario").innerText =
            (serie.aviso && serie.aviso.ativo) ? serie.aviso.texto : "";
        atualizarBotaoFav(serie.nome);
        mostrarTemporadas(serie);
    };

    window.mostrarTemporadas = (serie) => {
        const lista = document.getElementById("listaEps");
        lista.innerHTML = "";
        serie.temporadas.forEach(t => {
            // Verifica se algum ep da temporada tem "RENA"
            const temNovaNesta = t.episodios.some(e => e.novo === 'RENA');
            const b = document.createElement("button");
            b.className = "btn"; b.style.width = "100%";
            b.innerHTML = t.nome + (temNovaNesta ? ' <span class="badge-novo-inline">🟢 NOVO</span>' : '');
            b.onclick = () => mostrarEpisodios(serie, t);
            lista.appendChild(b);
        });
    };

    function mostrarEpisodios(serie, temporada) {
        const lista = document.getElementById("listaEps");
        lista.innerHTML = "";

        const btnVoltar = document.createElement("button");
        btnVoltar.className = "btn"; btnVoltar.style.width = "100%";
        btnVoltar.innerText = "⬅ Voltar para temporadas";
        btnVoltar.onclick = () => mostrarTemporadas(serie);
        lista.appendChild(btnVoltar);

        temporada.episodios.forEach(e => {
            const btn = document.createElement("button");
            btn.className = "btn ep-btn"; btn.style.width = "100%";
            btn.dataset.linkEp = e.link;

            const visto  = estaVisto(e.link)
                ? '<span class="badge-visto" style="color:#00ff88;">👁️</span>'
                : '<span class="badge-visto" style="display:none; color:#00ff88;">👁️</span>';
            const cont   = parseFloat(localStorage.getItem("tempo_" + e.link)) > 5
                ? '<span style="color:#7f00ff; font-size:11px;"> ▶ continuar</span>' : '';
            const novoEp = e.novo === 'RENA'
                ? '<span class="badge-novo-inline">🟢 NOVO</span>' : '';

            btn.innerHTML = `${e.nome} ${visto}${cont}${novoEp}`;
            btn.onclick = () => abrirPlayer(e.link, e.nome);
            lista.appendChild(btn);
        });
    }

    window.abrirHQ = (hq) => {
        window.linkAtual = hq.link; // usa o link da HQ para avaliação
        document.getElementById("gridPrincipal").style.display = "none";
        document.getElementById("telaEpisodios").style.display = "block";
        document.getElementById("capaGrande").src = hq.capa;
        document.getElementById("areaHQ").style.display = "block";
        document.getElementById("sinopseHQ").innerText = hq.sinopse;
        document.getElementById("linkHQ").href = hq.link;
        document.getElementById("playerArea").style.display = "none";
        document.getElementById("listaEps").innerHTML = "";
        document.getElementById("avisoEtario").innerText = "";
        document.getElementById("epAtual").innerText = "";
        atualizarBotaoFav(hq.nome);
        ativarReacoes(hq.link);
        if (window.registrarView) window.registrarView(hq.link);
    };

    window.abrirFilme = (filme) => {
        document.getElementById("gridPrincipal").style.display = "none";
        document.getElementById("telaEpisodios").style.display = "block";
        document.getElementById("capaGrande").src = filme.capa;
        document.getElementById("areaHQ").style.display = "none";
        document.getElementById("avisoEtario").innerText =
            (filme.aviso && filme.aviso.texto) ? filme.aviso.texto : "";
        atualizarBotaoFav(filme.nome);
        abrirPlayer(filme.link, filme.nome);
    };

    window.abrirExtras = () => {
        document.getElementById("gridPrincipal").style.display = "none";
        document.getElementById("telaEpisodios").style.display = "block";
        document.getElementById("capaGrande").src = "https://files.catbox.moe/jj59ob.png";
        document.getElementById("areaHQ").style.display = "none";
        document.getElementById("playerArea").style.display = "none";
        document.getElementById("areaReacoes").style.display = "none";
        document.getElementById("avisoEtario").innerText = "";
        document.getElementById("epAtual").innerText = "Extras";
        document.getElementById("txtSecao").innerText = "Extras";
        document.getElementById("btnFavDestaque").style.display = "none";

        const lista = document.getElementById("listaEps");
        if (!extras || extras.length === 0) {
            lista.innerHTML = "<p style='text-align:center; color:#555; padding:20px;'>Por enquanto não tem nada aqui! 🥲</p>";
        } else {
            lista.innerHTML = "";
            extras.forEach(ex => {
                const btn = document.createElement("button");
                btn.className = "btn ep-btn"; btn.style.width = "100%";
                btn.dataset.linkEp = ex.link;

                const visto = estaVisto(ex.link)
                    ? '<span class="badge-visto" style="color:#00ff88;">👁️</span>'
                    : '<span class="badge-visto" style="display:none; color:#00ff88;">👁️</span>';

                btn.innerHTML = `${ex.nome} ${visto}`;
                btn.onclick = () => abrirPlayer(ex.link, ex.nome);
                lista.appendChild(btn);
            });
        }
    };

    // ─── VOLTAR ──────────────────────────────────────────────────────────────

    window.voltar = () => {
        player.pause();
        window.linkAtual = '';
        document.getElementById("telaEpisodios").style.display = "none";
        document.getElementById("gridPrincipal").style.display = "";
        document.getElementById("btnFavDestaque").style.display = "";
        checarProgresso();
    };

    // ─── INICIAR ─────────────────────────────────────────────────────────────
    renderizarCatalogo('serie');
});
</script>
</body>
</html>
